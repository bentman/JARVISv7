# JARVISv7 pyproject.toml
#
# Single source of truth for Python package metadata, dependencies, extras,
# and tooling configuration. Hardware-family packages are declared as
# optional dependencies (extras) with PEP 508 environment markers where
# markers suffice. Vendor gating that markers cannot express (NPU vendor,
# CUDA availability) is applied by backend/app/hardware/provisioning.py.
#
# Never hand-edit backend/requirements.txt. It is generated by
# `scripts/provision.py lock` from the base extra only.

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

# ---------------------------------------------------------------------------
# Project metadata (PEP 621)
# ---------------------------------------------------------------------------
[project]
name = "jarvisv7"
version = "0.0.1"
description = "Local-first, voice-first personal assistant (v7)."
readme = "README.md"
requires-python = ">=3.11,<3.14"
license = { text = "MIT" }
authors = [{ name = "bentman" }]
keywords = ["voice", "assistant", "local-first", "onnx", "kokoro", "whisper"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Operating System :: Microsoft :: Windows",
  "Operating System :: POSIX :: Linux",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Multimedia :: Sound/Audio :: Speech",
]

# Base dependencies.
# Rule: only packages that install cleanly on every supported host class
# (Windows x64, Windows ARM64, Linux x64, Linux ARM64) simultaneously.
# No runtime-specific ML packages. ML packages enter through hardware extras.
dependencies = [
  # Web/API framework
  "fastapi>=0.110",
  "uvicorn[standard]>=0.27",

  # Data + settings
  "pydantic>=2.6",
  "pydantic-settings>=2.2",
  "python-dotenv>=1.0",
  "pyyaml>=6.0",

  # HTTP
  "httpx>=0.27",
  "huggingface_hub>=0.22",

  # Numerics (universal baseline; version-bounded to stay cross-platform)
  "numpy>=1.26,<3.0",

  # Audio I/O (cross-platform; CPython wheels available for target archs)
  "sounddevice>=0.4.6",
  "soundfile>=0.12",

  # Wake word — universal per PyPI (Windows x86_64 + arm64, macOS, Linux)
  "pvporcupine>=3.0",

  # Local system introspection for profiler
  "psutil>=5.9",

  # Logging
  "structlog>=24.1",
]

# ---------------------------------------------------------------------------
# Optional dependencies (extras)
# ---------------------------------------------------------------------------
# Each extra is one hardware family. The provisioning resolver translates
# host facts (from the profiler) into the ordered list of extras to install.
# Environment markers (PEP 508) gate arch-detectable extras automatically.

[project.optional-dependencies]

# Intentionally empty. CPU-only hosts install the base only.
hw-cpu-base = []

# x64 acceleration family defaults (primary voice runtime backbone).
# Applies when platform_machine is AMD64 (Windows) or x86_64 (Linux/macOS).
hw-x64-base = [
  "onnxruntime>=1.17; platform_machine=='AMD64' or platform_machine=='x86_64'",
  "onnx-asr>=0.8; platform_machine=='AMD64' or platform_machine=='x86_64'",
  "kokoro-onnx>=0.4; platform_machine=='AMD64' or platform_machine=='x86_64'",
  "openwakeword>=0.6; platform_machine=='AMD64' or platform_machine=='x86_64'",
]

# ARM64 base. onnxruntime publishes win_arm64 wheels for CPython 3.11-3.14.
# Applies when platform_machine is ARM64 (Windows) or aarch64 (Linux).
hw-arm64-base = [
  "onnxruntime>=1.17; platform_machine=='ARM64' or platform_machine=='aarch64'",
  "onnx-asr>=0.8; platform_machine=='ARM64' or platform_machine=='aarch64'",
  "kokoro-onnx>=0.4; platform_machine=='ARM64' or platform_machine=='aarch64'",
  "openwakeword>=0.6; platform_machine=='ARM64' or platform_machine=='aarch64'",
]

# NVIDIA + CUDA. Resolver applies on NVIDIA hosts with CUDA present.
# Note: onnxruntime-gpu is x64-only on Windows; the resolver should only
# return this extra when platform is x64-capable.
hw-gpu-nvidia-cuda = [
  "onnxruntime-gpu>=1.17",
]

# AMD GPU (DirectML on Windows; ROCm on Linux deferred to H.3).
# Resolver applies on AMD hosts.
hw-gpu-amd = [
  "onnxruntime-directml>=1.17; sys_platform=='win32'",
]

# Intel discrete / iGPU via DirectML on Windows.
hw-gpu-intel = [
  "onnxruntime-directml>=1.17; sys_platform=='win32'",
]

# Qualcomm NPU via QNN execution provider (slot defined in A.6; wired in H.2).
# Windows ARM64 wheels for CPython 3.11-3.13 per PyPI 2.0.0 listing.
hw-npu-qualcomm-qnn = [
  "onnxruntime-qnn>=2.0; platform_machine=='ARM64' and sys_platform=='win32'",
]

# Optional alternative wake runtime (openWakeWord is primary).
# Kept as explicit extra so Porcupine `.ppn` model acquisition and its
# single-keyword constraint are operator-opt-in rather than default.
hw-wake-porcupine = [
  # pvporcupine is already in base (universal). This extra is a marker
  # for provisioning reasoning + future keyword-acquisition deps.
]

# Developer tooling
dev = [
  "pytest>=8.0",
  "pytest-cov>=5.0",
  "pytest-asyncio>=0.23",
  "ruff>=0.4",
  "mypy>=1.9",
  "pre-commit>=3.6",
]

# ---------------------------------------------------------------------------
# Packaging (source layout)
# ---------------------------------------------------------------------------
[tool.setuptools.packages.find]
where = ["backend"]
include = ["app*"]
exclude = ["tests*"]

# ---------------------------------------------------------------------------
# pytest
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["backend/tests"]
addopts = [
  "-ra",
  "--strict-markers",
  "--strict-config",
]
markers = [
  # Host arch
  "x64: requires x86_64 / AMD64 host",
  "arm64: requires ARM64 / aarch64 host",
  # Device readiness
  "cuda: requires readiness-proven CUDA execution provider",
  "directml: requires readiness-proven DirectML execution provider",
  "qnn: requires readiness-proven QNN execution provider",
  # Surface
  "live: requires live hardware (mic / speaker / GPU / NPU); not CI-safe without audio",
  "slow: runtime greater than 5 seconds",
  # External services
  "requires_ollama: requires a running Ollama endpoint",
  "requires_porcupine: requires PICOVOICE_ACCESS_KEY env var set",
  "requires_redis: requires a running Redis instance",
  "requires_searxng: requires a running SearXNG instance",
  "requires_docker: requires docker / docker-compose",
  "requires_qairt: requires Qualcomm QAIRT SDK installed and on PATH",
  # Family
  "stt: speech-to-text runtime tests",
  "tts: text-to-speech runtime tests",
  "llm: LLM runtime tests",
  "wake: wake-word runtime tests",
  "turn: turn engine tests",
  "desktop: desktop shell tests",
  "agents: agent framework tests",
]
asyncio_mode = "auto"

# ---------------------------------------------------------------------------
# Ruff (lint + format)
# ---------------------------------------------------------------------------
[tool.ruff]
line-length = 100
target-version = "py311"
src = ["backend"]
extend-exclude = [
  "backend/.venv",
  "backend/tests/fixtures/**/*",
  "models",
  "data",
  "cache",
  "reports",
]

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "UP",  # pyupgrade
  "N",   # pep8-naming
  "SIM", # flake8-simplify
  "RUF", # ruff-specific
]
ignore = [
  "E501",  # line-length handled by formatter
  "B008",  # allow FastAPI Depends() default-arg pattern
]

[tool.ruff.lint.per-file-ignores]
"backend/tests/**/*.py" = ["N802", "N803", "N806"]  # test naming flexibility

# ---------------------------------------------------------------------------
# Mypy
# ---------------------------------------------------------------------------
[tool.mypy]
python_version = "3.11"
strict = false
warn_unused_ignores = true
warn_redundant_casts = true
warn_unused_configs = true
check_untyped_defs = true
namespace_packages = true
explicit_package_bases = true
files = ["backend/app"]
exclude = [
  "backend/.venv",
  "backend/tests/fixtures",
]

[[tool.mypy.overrides]]
module = [
  "onnxruntime.*",
  "onnx_asr.*",
  "kokoro_onnx.*",
  "openwakeword.*",
  "pvporcupine.*",
  "sounddevice.*",
  "soundfile.*",
]
ignore_missing_imports = true

# ---------------------------------------------------------------------------
# Coverage
# ---------------------------------------------------------------------------
[tool.coverage.run]
source = ["backend/app"]
branch = true
omit = [
  "backend/tests/*",
  "backend/.venv/*",
]

[tool.coverage.report]
show_missing = true
skip_empty = true
exclude_lines = [
  "pragma: no cover",
  "raise NotImplementedError",
  "if __name__ == .__main__.:",
  "if TYPE_CHECKING:",
]
