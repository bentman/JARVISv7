roles:
  - role_id: planner
    display_name: Planner
    description: Produces proposed plans for future agent workflows.
    prompt_path: config/prompts/agents/planner.md
    allowed_message_types: [request, response, plan, policy_decision]
  - role_id: executor
    display_name: Executor
    description: Evaluates planned actions against allowed tool boundaries.
    prompt_path: config/prompts/agents/executor.md
    allowed_message_types: [request, response, event, outcome, policy_decision]
  - role_id: critic
    display_name: Critic
    description: Reviews proposed agent records and reports risks or corrections.
    prompt_path: config/prompts/agents/critic.md
    allowed_message_types: [request, response, outcome, policy_decision]
  - role_id: curator
    display_name: Curator
    description: Scores existing artifacts for future dataset proposals.
    prompt_path: config/prompts/agents/curator.md
    allowed_message_types: [request, response, event, outcome]
  - role_id: learner
    display_name: Learner
    description: Produces proposal-only learning or evaluation plans.
    prompt_path: config/prompts/agents/learner.md
    allowed_message_types: [request, response, plan, outcome]
