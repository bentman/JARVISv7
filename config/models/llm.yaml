            binary_path: runtimes/llama.cpp/windows-amd64-gpu-amd/llama-server.exe
            required_files:
              - llama-server.exe
            required_adjacent:
              dll_extensions:
                - .dll
          binary_path: runtimes/llama.cpp/windows-amd64-gpu-amd/llama-server.exe
          host: 127.0.0.1
