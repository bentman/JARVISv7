default_model: assistant-small-q4

ollama:
  base_url: ${OLLAMA_BASE_URL}
  model: ${OLLAMA_MODEL}
  num_ctx: ${OLLAMA_NUM_CTX}
  version_note: "Ollama HTTP API validated with local phi4-mini; host-specific context is env-owned."

models:
  assistant-small-q4:
    family: llm
    runtime: llama_cpp
    format: gguf
    quantization: q4_k_m
    local_path: models/llm/assistant-small-q4/qwen2.5-0.5b-instruct-q4_k_m.gguf
    source:
      type: huggingface
      repo_id: Qwen/Qwen2.5-0.5B-Instruct-GGUF
      file: qwen2.5-0.5b-instruct-q4_k_m.gguf
      expected_size_mb: 491
    routes:
      - voice_chat
      - text_chat
      - research
      - code_plan
      - tool_plan
      - agent_plan_disabled
    generation_defaults:
      temperature: 0.4
      top_p: 0.9
      top_k: 40
      repeat_penalty: 1.08
      max_tokens: 256
      stop:
        - "\nUser:"
        - "\nAssistant:"
        - "User:"
        - "Assistant:"
    serve_profiles:
      hardware_profiles:
        windows_amd64_cpu:
          profile_id: windows_amd64_cpu
          os: windows
          arch: amd64
          provisioning_extras:
            - hw-cpu-base
            - hw-x64-base
            - hw-x64-ort-cpu
          accelerator: cpu
          runtime_artifact:
            source:
              type: pending-pinned-release
              reason: S-G1-pending
            binary_path: runtimes/llama.cpp/windows-amd64-cpu/llama-server.exe
            required_files:
              - llama-server.exe
            required_adjacent:
              dll_extensions:
                - .dll
          binary_path: runtimes/llama.cpp/windows-amd64-cpu/llama-server.exe
          host: 127.0.0.1
          port: 8080
          base_url: http://127.0.0.1:8080
          validation_status: declared-not-validated
          launch:
            ctx_size: 4096
            threads: auto
            threads_batch: auto
            batch_size: 1024
            ubatch_size: 256
            gpu_layers: 0
            cache_type_k: f16
            cache_type_v: f16
            parallel: 1
            cont_batching: true
            warmup: true
        windows_arm64_cpu:
          profile_id: windows_arm64_cpu
          os: windows
          arch: arm64
          provisioning_extras:
            - hw-cpu-base
            - hw-arm64-base
            - hw-arm64-ort-cpu
          accelerator: cpu
          runtime_artifact:
            source:
              type: pending-pinned-release
              reason: S-G1-pending
            binary_path: runtimes/llama.cpp/windows-arm64-cpu/llama-server.exe
            required_files:
              - llama-server.exe
            required_adjacent:
              dll_extensions:
                - .dll
          binary_path: runtimes/llama.cpp/windows-arm64-cpu/llama-server.exe
          host: 127.0.0.1
          port: 8080
          base_url: http://127.0.0.1:8080
          validation_status: declared-not-validated
          launch:
            ctx_size: 4096
            threads: auto
            threads_batch: auto
            batch_size: 1024
            ubatch_size: 256
            gpu_layers: 0
            cache_ram_mb: 4096
            parallel: 1
            cont_batching: true
            warmup: true
        windows_amd64_gpu_nvidia_cuda:
