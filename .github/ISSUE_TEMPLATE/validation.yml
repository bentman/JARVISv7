name: Validation
description: Exceptional independent proof needing a separate host, hardware, service, operator, or product path. Put ordinary tests in the work issue.
title: "[validation] "
labels:
  - type:validation
body:
  - type: textarea
    id: target
    attributes:
      label: Target
      description: What existing result requires independent validation?
      placeholder: Identify the behavior or integration.
    validations:
      required: true
  - type: textarea
    id: validation-steps
    attributes:
      label: Validation steps
      description: What independent steps or interactions are required?
      placeholder: Include the host, hardware, service, operator, or product path.
    validations:
      required: true
  - type: textarea
    id: success-criteria
    attributes:
      label: Success criteria
      description: What observable evidence proves the target?
      placeholder: State the expected result.
    validations:
      required: true
  - type: textarea
    id: limitations
    attributes:
      label: Limitations
      description: What cannot be validated here?
      placeholder: Note relevant environment constraints.
