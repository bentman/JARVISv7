name: Parent outcome
description: Coordinate one outcome through GitHub sub-issues and dependencies.
title: "[parent] "
labels:
  - type:outcome
body:
  - type: textarea
    id: outcome
    attributes:
      label: Outcome
      description: What integrated result should this parent deliver?
      placeholder: Describe the completed outcome.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What current evidence and related work matter?
      placeholder: Summarize the starting point and link related issues.
    validations:
      required: true
  - type: textarea
    id: completion
    attributes:
      label: Completion
      description: What proves the coordinated outcome is complete?
      placeholder: State the observable end result.
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: What boundaries must the child issues preserve?
      placeholder: Note only essential constraints.
