name: Investigation
description: Research, reproduce, compare, or resolve an architectural decision.
title: "[investigation] "
labels:
  - type:investigation
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What must be investigated or decided?
      placeholder: State the focused question.
    validations:
      required: true
  - type: textarea
    id: known-evidence
    attributes:
      label: Known evidence
      description: What is already known?
      placeholder: Summarize observations, references, or alternatives.
    validations:
      required: true
  - type: textarea
    id: required-result
    attributes:
      label: Required result
      description: What evidence or decision completes this investigation?
      placeholder: Describe the required finding or recommendation.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: What else is essential to the investigation?
      placeholder: Add limitations or dependencies if needed.
